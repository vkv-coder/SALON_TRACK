<!DOCTYPE html>
<html>
<head>
  <title>Salon Track</title>
</head>

<body>

<h2>Salon Track</h2>

<div id="loginBox">
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="appBox" style="display:none;">
  <h3 id="welcome"></h3>

  <button onclick="showCustomerForm()">Add Customer</button>
  <button onclick="alert('New Visit')">New Visit</button>

  <div id="customerForm" style="display:none; margin-top:20px;">
    <input type="text" id="cust_name" placeholder="Customer Name"><br><br>
    <input type="text" id="cust_mobile" placeholder="Mobile"><br><br>
    <button onclick="saveCustomer()">Save Customer</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const client = supabase.createClient(
  "https://txfifgqslatvaiwpbhek.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcW5ua3pvempza3ppYWl6YWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mjk1ODAsImV4cCI6MjA4ODUwNTU4MH0.sEYeWnm0dvuw8bLSVnQhqmgV8LB-pELjpuVIa3Us1Gg"
);

async function login() {
  let mobile = document.getElementById("mobile").value;

  let { data } = await client
    .from('users')
    .select('*')
    .eq('mobile', mobile);

  if (!data || data.length === 0) {
    let name = prompt("Enter your name");

    if (name) {
      let res = await client.from('users').insert([
        { mobile: mobile, name: name }
      ]);

      if (res.error) {
        alert("Error: " + res.error.message);
        return;
      }
    }
  }

  localStorage.setItem("mobile", mobile);

  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";

  document.getElementById("welcome").innerText = "Welcome " + mobile;
}

function showCustomerForm() {
  document.getElementById("customerForm").style.display = "block";
}

async function saveCustomer() {
  let name = document.getElementById("cust_name").value;
  let mobile = document.getElementById("cust_mobile").value;

  let userMobile = localStorage.getItem("mobile");

  let { data: user } = await client
    .from('users')
    .select('*')
    .eq('mobile', userMobile)
    .single();

  let res = await client.from('salon_customers').insert([
    {
      user_id: user.id,
      name: name,
      mobile: mobile
    }
  ]);

  if (res.error) {
    alert("Error: " + res.error.message);
  } else {
    alert("Customer saved");
  }
}
</script>

</body>
</html>
