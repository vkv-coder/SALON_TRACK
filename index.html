<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }

/* HEADER */
.header {
background:#2563eb;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* MENU */
.menu {
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
background:white;
}

.menu button {
padding:16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
}

@media(max-width:500px){
.menu { grid-template-columns:1fr; }
}

/* CARD */
.card {
background:white;
padding:18px;
margin:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* INPUT */
input {
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

/* SERVICE */
.service-row {
display:flex;
align-items:center;
gap:12px;
margin:10px 0;
}

.service-row input[type="checkbox"] {
transform:scale(1.3);
}

.service-name { flex:1; }
.service-rate { width:90px; }

/* FOOT INFO */
.footer {
text-align:center;
font-size:13px;
color:#666;
padding:10px;
}
</style>
</head>

<body>

<div class="header">SALON TRACK</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");
let menu = document.getElementById("menu");

let visitCustomers = [];
let visitServices = [];
let selectedCustomer = null;

// ================= LOGIN =================

function showLogin(){
menu.innerHTML = "";
app.innerHTML = `
<div class="card">
<h2 style="text-align:center;">SALON TRACK</h2>
<input id="mobile" placeholder="Enter Mobile">
<button onclick="login()" style="width:100%;background:#2563eb;color:white;padding:12px;border:none;border-radius:8px;">Login</button>
</div>`;
}

async function login(){

try{
let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile.value)
.single();

if(!data){
alert("User not found");
return;
}

localStorage.setItem("userId", data.id);
localStorage.setItem("userName", data.name || "User");

showMenu();
showHome();

}catch(e){
alert("Login error");
}
}

// ================= MENU =================

function showMenu(){
menu.innerHTML = `
<div class="menu">
<button onclick="showMaster()">Master</button>
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showReports()">Reports</button>
<button onclick="showReminder()">Reminder</button>
<button onclick="showPrivacy()">Privacy</button>
<button onclick="logout()">Logout</button>
</div>

<div class="footer">
📧 vkvcoder.support@gmail.com
</div>
`;
}

// ================= HOME =================

function showHome(){
app.innerHTML = `
<div class="card">
<h3>Welcome, ${localStorage.getItem("userName")}</h3>
</div>`;
}

// ================= ADD VISIT =================

async function showAddVisit(){

try{

let userId = localStorage.getItem("userId");

let { data: customers } = await client.from("salon_customers").select("*").eq("user_id", userId);
let { data: services } = await client.from("salon_services").select("*").eq("user_id", userId);

visitCustomers = customers || [];
visitServices = services || [];
selectedCustomer = null;

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<input id="custSearch" placeholder="Search Customer" onkeyup="filterCustomer()">
<div id="custList"></div>

<hr>

<div id="serviceList"></div>

<hr>

<h3>Total ₹ <span id="total">0</span></h3>

<input type="date" id="vdate">
<input id="remDays" type="number" placeholder="Reminder Days (e.g. 30)">

<button onclick="saveVisit()" style="width:100%;background:#2563eb;color:white;padding:12px;border:none;border-radius:8px;">Save Visit</button>
</div>`;

renderCustomerList(visitCustomers);
renderServiceList(visitServices);

vdate.value = new Date().toISOString().split("T")[0];

}catch(e){
alert("Add Visit error");
}
}

// ================= CUSTOMER =================

function renderCustomerList(data){
custList.innerHTML = (data || []).map(c=>`
<div onclick="selectCustomer('${c.id}','${c.name}')">${c.name}</div>
`).join("");
}

function filterCustomer(){
let txt = custSearch.value.toLowerCase();
renderCustomerList(visitCustomers.filter(c=>c.name.toLowerCase().includes(txt)));
}

function selectCustomer(id,name){
selectedCustomer = {id,name};
custSearch.value = name;
custList.innerHTML = "";
}

// ================= SERVICES =================

function renderServiceList(data){
serviceList.innerHTML = (data || []).map(s=>`
<div class="service-row">
<input type="checkbox" id="chk_${s.id}" onchange="calcTotal()">
<div class="service-name">${s.name}</div>
<input type="number" value="${s.rate}" id="rate_${s.id}" class="service-rate" onchange="calcTotal()">
</div>
`).join("");
}

// ================= TOTAL =================

function calcTotal(){
let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
total += parseFloat(document.getElementById("rate_"+s.id).value || 0);
}
});

document.getElementById("total").innerText = total;
}

// ================= SAVE =================

async function saveVisit(){

try{

if(!selectedCustomer){
alert("Select customer");
return;
}

let total = 0;
let services = [];

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
let rate = parseFloat(document.getElementById("rate_"+s.id).value || 0);
services.push(`${s.name} ₹${rate}`);
total += rate;
}
});

let reminderDate = null;

if(remDays.value){
let d = new Date(vdate.value);
d.setDate(d.getDate() + parseInt(remDays.value));
reminderDate = d.toISOString().split("T")[0];
}

await client.from("salon_visits").insert([{
user_id: localStorage.getItem("userId"),
customer_name: selectedCustomer.name,
services: services.join(", "),
amount: total,
visit_date: vdate.value,
reminder_date: reminderDate
}]);

alert("Saved");
showAddVisit();

}catch(e){
alert("Save error");
}
}

// ================= REPORT =================

async function showReports(){

try{

let { data } = await client
.from("salon_visits")
.select("*")
.eq("user_id", localStorage.getItem("userId"));

let list = data || [];

app.innerHTML = `
<div class="card">
<h2>Reports</h2>
${list.length === 0 ? "No data" : list.map(v=>`
<div class="card">
<b>${v.customer_name}</b><br>
₹${v.amount} | ${v.visit_date}
</div>
`).join("")}
</div>`;

}catch(e){
alert("Report error");
}
}

// ================= REMINDER =================

async function showReminder(){

try{

let today = new Date().toISOString().split("T")[0];

let { data } = await client
.from("salon_visits")
.select("*")
.eq("user_id", localStorage.getItem("userId"))
.lte("reminder_date", today);

let list = data || [];

app.innerHTML = `
<div class="card">
<h2>Reminders</h2>
${list.length === 0 ? "No reminders" : list.map(v=>`
<div class="card">
<b>${v.customer_name}</b><br>
Due: ${v.reminder_date}
</div>
`).join("")}
</div>`;

}catch(e){
alert("Reminder error");
}
}

// ================= OTHER =================

function showMaster(){
app.innerHTML = `<div class="card">Master coming next</div>`;
}

function showPrivacy(){
app.innerHTML = `
<div class="card">
<h3>Privacy Policy</h3>
Your data is सुरक्षित and used only for salon tracking.
</div>`;
}

function logout(){
localStorage.clear();
showLogin();
}

// START
showLogin();

</script>
</body>
</html>
