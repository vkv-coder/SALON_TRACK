<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

button { padding:12px; border:none; border-radius:6px; }
.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; margin-top:10px; }

input, select {
width:100%; padding:10px; margin:5px 0;
border-radius:6px; border:1px solid #ccc;
}
</style>

</head>

<body>

<div id="app"></div>

<script>

// ===== SUPABASE =====
const SUPABASE_URL = "https://jqqnnkzozjskziaizajg.supabase.co";
const SUPABASE_KEY = "sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let app = document.getElementById("app");

// ===== LOGIN =====
function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile Number">
<button class="blue" onclick="checkLogin()">Continue</button>
</div>`;
}

async function checkLogin(){

let mobile = document.getElementById("mobile").value;

if(!mobile){ alert("Enter mobile"); return; }

let { data, error } = await client
.from("users")
.select("*")
.eq("mobile", mobile)
.single();

if(error && error.code !== "PGRST116"){
alert(error.message);
return;
}

if(data){
localStorage.setItem("currentUser", mobile);
localStorage.setItem("userId", data.id); // ✅ UUID stored
showHome();
}else{
showRegister(mobile);
}
}

// ===== REGISTER =====
function showRegister(mobile){
app.innerHTML = `
<div class="card">
<h2>Register</h2>
<input id="name" placeholder="Owner Name">
<input id="shop" placeholder="Shop Name">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<button class="blue" onclick="register('${mobile}')">Register</button>
</div>`;
}

async function register(mobile){

let name = document.getElementById("name").value;
let shop = document.getElementById("shop").value;
let city = document.getElementById("city").value;
let state = document.getElementById("state").value;

if(!name || !shop || !city || !state){
alert("Fill all fields");
return;
}

let today = new Date().toISOString().split("T")[0];
let endDate = new Date();
endDate.setDate(endDate.getDate() + 15);
let end = endDate.toISOString().split("T")[0];

let { data, error } = await client
.from("users")
.insert([{
mobile: mobile,
name: name,
shop: shop,
city: city,
state: state,
start_date: today,
expiry_date: end
}])
.select(); // ✅ important

if(error){
alert(error.message);
return;
}

localStorage.setItem("currentUser", mobile);
localStorage.setItem("userId", data[0].id); // ✅ UUID

alert("Registered");

showHome();
}

// ===== HOME =====
function showHome(){
app.innerHTML = `
<div class="card">
<h3>Salon App</h3>

<div class="grid">
<button class="blue" onclick="showMaster()">Master</button>
<button class="blue">Add Visit</button>
<button class="blue">Reports</button>
<button class="blue">Reminder</button>
</div>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ===== MASTER MENU =====
function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>

<button class="blue" onclick="showCustomerMaster()">Customer</button>
<button class="blue">Service</button>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== CUSTOMER MASTER =====
async function showCustomerMaster(){

let userId = localStorage.getItem("userId");

if(!userId){
alert("Login again");
logout();
return;
}

let { data, error } = await client
.from("salon_customers")
.select("*")
.eq("user_id", userId);

if(error){
alert(error.message);
return;
}

app.innerHTML = `
<div class="card">
<h2>Customer Master</h2>

<button class="blue" onclick="showAddCustomer()">+ Add Customer</button>

${data.map(c=>`
<p>${c.salutation || ""} ${c.name} - ${c.mobile || ""}</p>
`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

// ===== ADD CUSTOMER =====
function showAddCustomer(){
app.innerHTML = `
<div class="card">
<h2>Add Customer</h2>

<select id="salutation">
<option value="">Salutation</option>
<option>Mr</option>
<option>Ms</option>
<option>Mrs</option>
<option>Dr</option>
</select>

<input id="custName" placeholder="Name">
<input id="custMobile" placeholder="Mobile">

<button class="blue" onclick="saveCustomer()">Save</button>
<button class="gray" onclick="showCustomerMaster()">Back</button>
</div>`;
}

// ===== SAVE CUSTOMER =====
async function saveCustomer(){

let name = document.getElementById("custName").value;
let mobile = document.getElementById("custMobile").value;
let salutation = document.getElementById("salutation").value;

let userId = localStorage.getItem("userId");

if(!name){
alert("Enter name");
return;
}

let { error } = await client
.from("salon_customers")
.insert([{
user_id: userId,
name: name,
mobile: mobile,
salutation: salutation
}]);

if(error){
alert(error.message);
return;
}

alert("Customer Saved");

showCustomerMaster();
}

// ===== LOGOUT =====
function logout(){
localStorage.clear();
showLogin();
}

// ===== START =====
if(localStorage.getItem("currentUser")){
showHome();
}else{
showLogin();
}

</script>

</body>
</html>
