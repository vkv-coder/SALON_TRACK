<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }
.header { background:#2563eb;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
.menu { display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;background:white;}
.menu button { padding:16px;border:none;border-radius:10px;background:#2563eb;color:white;font-size:16px;}
.card { background:white;padding:18px;margin:12px;border-radius:12px;}
input,select { width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
.footer { text-align:center;font-size:13px;color:#666;padding:10px;}

.service-row {
display:flex;
align-items:center;
justify-content:space-between;
padding:8px 0;
border-bottom:1px solid #eee;
}

.left {
display:flex;
align-items:center;
gap:10px;
}

.price-box {
width:80px;
}
</style>
</head>

<body>

<div class="header">SALON TRACK</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = window.supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app=document.getElementById("app");
let menu=document.getElementById("menu");

// LOGIN
function showLogin(){
menu.innerHTML="";
app.innerHTML=`
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile">
<button onclick="login()">Login</button>
</div>`;
}

async function login(){
let mob=document.getElementById("mobile").value.trim();
if(!mob){alert("Enter mobile");return;}

let {data}=await client.from("users").select("*").eq("mobile",mob).limit(1);

let user;
if(!data || data.length==0){
let {data:newUser}=await client.from("users").insert([{mobile:mob,name:"User"}]).select();
user=newUser[0];
}else user=data[0];

localStorage.setItem("userId",user.id);
showMenu(); showHome();
}

// MENU
function showMenu(){
menu.innerHTML=`
<div class="menu">
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showPrivacy()">Privacy</button>
<button onclick="logout()">Logout</button>
</div>
<div class="footer">📧 vkvcoder.support@gmail.com</div>`;
}

function showHome(){
app.innerHTML=`<div class="card">Welcome</div>`;
}

// ✅ ADD VISIT (UPDATED UI)
async function showAddVisit(){

let {data:c}=await client.from("salon_customers").select("*");
let {data:s}=await client.from("salon_services").select("*");

app.innerHTML=`
<div class="card">

<h3>Select Customer</h3>
<select id="cust">
${c.map(x=>`<option>${x.name}</option>`)}
</select>

<h3>Select Service</h3>

<div id="serviceList">
${s.map(serv=>`
<div class="service-row">

<div class="left">
<input type="checkbox" onchange="calcTotal()">
<span>${serv.name}</span>
</div>

<input class="price-box" type="number" value="${serv.rate}" onchange="calcTotal()">

</div>
`).join("")}
</div>

<h3>Total ₹ <span id="total">0</span></h3>

<button onclick="saveVisit()">Save</button>

</div>`;
}

// ✅ TOTAL CALCULATION (UPDATED)
function calcTotal(){
let total=0;

document.querySelectorAll("#serviceList .service-row").forEach(row=>{
let checkbox=row.querySelector("input[type=checkbox]");
let price=row.querySelector("input[type=number]");

if(checkbox.checked){
total+=Number(price.value || 0);
}
});

document.getElementById("total").innerText=total;
}

// SAVE
function saveVisit(){
alert("Next step: save to DB");
}

// PRIVACY
function showPrivacy(){
app.innerHTML=`
<div class="card">
<h2>🔒 Privacy Policy</h2>
<div style="background:#2563eb;color:white;padding:10px;border-radius:10px;text-align:center;">
<b>Think of us as a bank locker — We hold your data safely, but only YOU have the key!</b>
</div>
</div>`;
}

// LOGOUT
function logout(){
localStorage.clear();
showLogin();
}

showLogin();

</script>
</body>
</html>
