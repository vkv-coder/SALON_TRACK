<!DOCTYPE html>
<html>
<head>
  <title>Salon Track</title>
</head>

<body>

<h2>Salon Track</h2>

<input type="text" id="mobile" placeholder="Enter Mobile">
<button onclick="login()">Login</button>

<!-- ✅ Supabase v1 (IMPORTANT CHANGE) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@1"></script>

<script>

// ✅ USE ANON KEY (eyJhbGc...)
const SUPABASE_URL = "https://txfifgqslatvaiwpbhek.supabase.co";
const SUPABASE_KEY = "PASTE_ANON_KEY_HERE";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login() {

  let mobile = document.getElementById("mobile").value;

  if (!mobile) {
    alert("Enter mobile number");
    return;
  }

  const { data, error } = await client
    .from('users')
    .select('*')
    .eq('mobile', mobile);

  console.log(data, error);

  if (error) {
    alert(error.message);
    return;
  }

  if (!data || data.length === 0) {

    let today = new Date();
    let expiry = new Date();
    expiry.setDate(today.getDate() + 7);

    const { error: insertError } = await client
      .from('users')
      .insert([
        {
          mobile: mobile,
          start_date: today.toISOString().split('T')[0],
          expiry_date: expiry.toISOString().split('T')[0]
        }
      ]);

    if (insertError) {
      alert(insertError.message);
      return;
    }

    alert("Trial started for 7 days");

  } else {
    alert("Login success");
  }
}

</script>

</body>
</html>
