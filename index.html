<!DOCTYPE html>
<html>
<head>
  <title>Salon Track</title>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; margin:0; }
    .header { background:#2d6cdf; color:white; padding:15px; text-align:center; font-size:22px; }
    .menu { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:10px; }
    .btn { background:#2d6cdf; color:white; padding:12px; border:none; border-radius:8px; }
    .content { padding:10px; }
    input { padding:8px; width:200px; }
  </style>
</head>

<body>

<div class="header">SALON TRACK</div>

<div class="menu">
  <button class="btn" onclick="showMaster()">Master</button>
  <button class="btn" onclick="showVisit()">Add Visit</button>
  <button class="btn" onclick="showReminder()">Reminder</button>
  <button class="btn" onclick="showReports()">Reports</button>
  <button class="btn" onclick="showPrivacy()">Privacy</button>
  <button class="btn" onclick="logout()">Logout</button>
</div>

<div style="padding-left:10px;">vkvcoder.support@gmail.com</div>

<div id="content" class="content"></div>

<script>

const client = supabase.createClient(
  "https://jqqnnkzozjskziaizajg.supabase.co",
  "sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let user_id = null;

// ================= LOGIN =================

function showLogin(){
  document.getElementById("content").innerHTML = `
    <input id="mobile" placeholder="Mobile">
    <button onclick="login()">Login</button>
  `;
}

async function login(){
  let mob = document.getElementById("mobile").value;

  let {data} = await client.from("users").select("*").eq("mobile",mob).maybeSingle();

  if(!data){
    let res = await client.from("users").insert([{mobile:mob}]).select().single();
    user_id = res.data.id;
  } else {
    user_id = data.id;
  }

  showMaster();
}

// ================= MASTER =================

function showMaster(){
  document.getElementById("content").innerHTML = `
  
  <div style="display:flex; gap:10px;">
    <button onclick="showCustomerTab()" id="tabC" style="background:#2d6cdf;color:white;">Customer</button>
    <button onclick="showServiceTab()" id="tabS">Service</button>
  </div>

  <div id="custDiv">
    <h3>Add Customer</h3>
    <input id="cname" placeholder="Name"><br><br>
    <input id="cmob" placeholder="Mobile"><br><br>
    <input id="cbday" type="date"> Birthday<br><br>
    <input id="canni" type="date"> Anniversary<br><br>
    <button onclick="saveCustomer()">Save</button>
  </div>

  <div id="servDiv" style="display:none;">
    <h3>Add Service</h3>
    <input id="sname" placeholder="Service"><br><br>
    <input id="srate" placeholder="Rate"><br><br>
    <input id="sdays" placeholder="Reminder Days"><br><br>
    <button onclick="saveService()">Save</button>
  </div>
  `;
}

function showCustomerTab(){
  document.getElementById("custDiv").style.display="block";
  document.getElementById("servDiv").style.display="none";

  tabC.style.background="#2d6cdf";
  tabC.style.color="white";

  tabS.style.background="#ccc";
}

function showServiceTab(){
  document.getElementById("custDiv").style.display="none";
  document.getElementById("servDiv").style.display="block";

  tabS.style.background="#2d6cdf";
  tabS.style.color="white";

  tabC.style.background="#ccc";
}

// ================= SAVE CUSTOMER =================

async function saveCustomer(){

  let name = document.getElementById("cname").value;
  let mobile = document.getElementById("cmob").value;
  let birthday = document.getElementById("cbday").value;
  let anniversary = document.getElementById("canni").value;

  let {error} = await client.from("customers").insert([{
    user_id,
    name,
    mobile,
    birthday,
    anniversary
  }]);

  if(error){
    alert(error.message);
  } else {
    alert("Saved");
  }
}

// ================= SAVE SERVICE =================

async function saveService(){

  let name = document.getElementById("sname").value;
  let rate = document.getElementById("srate").value;
  let reminder_days = document.getElementById("sdays").value;

  let {error} = await client.from("salon_services").insert([{
    user_id,
    name,
    rate,
    reminder_days
  }]);

  if(error){
    alert(error.message);
  } else {
    alert("Saved");
  }
}

// ================= ADD VISIT =================

async function showVisit(){

  let {data:customers} = await client.from("customers").select("*").eq("user_id",user_id);
  let {data:services} = await client.from("salon_services").select("*").eq("user_id",user_id);

  let serviceHTML = "";

  services.forEach(s=>{
    serviceHTML += `
      <div>
        <input type="checkbox" value="${s.id}" data-rate="${s.rate}" onchange="calcTotal()">
        ${s.name} - ₹${s.rate}
      </div>
    `;
  });

  document.getElementById("content").innerHTML = `
    <select id="cust">
      ${customers.map(c=>`<option value="${c.id}">${c.name}</option>`)}
    </select>

    <br><br>

    ${serviceHTML}

    <h3>Total ₹ <span id="total">0</span></h3>

    <button onclick="saveVisit()">Save</button>
  `;
}

function calcTotal(){
  let total = 0;

  document.querySelectorAll("input[type=checkbox]:checked").forEach(cb=>{
    total += Number(cb.dataset.rate);
  });

  document.getElementById("total").innerText = total;
}

async function saveVisit(){

  let customer_id = document.getElementById("cust").value;
  let amount = document.getElementById("total").innerText;

  let {error} = await client.from("salon_visits").insert([{
    user_id,
    customer_id,
    amount
  }]);

  if(error){
    alert(error.message);
  } else {
    alert("Saved");
  }
}

// ================= REMINDER =================

function showReminder(){
  document.getElementById("content").innerHTML = "Reminder coming next step";
}

// ================= REPORT =================

function showReports(){
  document.getElementById("content").innerHTML = "Reports coming next step";
}

// ================= PRIVACY =================

function showPrivacy(){
  document.getElementById("content").innerHTML = "Privacy policy here";
}

function logout(){
  location.reload();
}

// START
showLogin();

</script>

</body>
</html>
