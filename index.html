<script>

// ================= MASTER =================

function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>

<button class="blue" onclick="showCustomerMenu()">Customer</button>
<button class="blue" onclick="showServiceMenu()">Service</button>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= CUSTOMER MENU =================

function showCustomerMenu(){
app.innerHTML = `
<div class="card">
<h2>Customer Master</h2>

<button class="blue" onclick="showAddCustomer()">Add Customer</button>
<button class="blue" onclick="showCustomerList()">View Customers</button>

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

// ================= CUSTOMER LIST =================

async function showCustomerList(){

app.innerHTML = `
<div class="card">
<h2>Customers</h2>

<input id="search" placeholder="Search..." onkeyup="searchCustomer()">
<div id="list"></div>

<button class="gray" onclick="showCustomerMenu()">Back</button>
</div>`;

let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_customers")
.select("*")
.eq("user_id", userId);

window.customerData = data;

renderCustomerList(data);
}

function renderCustomerList(data){
document.getElementById("list").innerHTML = data.map(c=>`
<div class="list-item" onclick="editCustomer('${c.id}')">
${c.name}
</div>
`).join("");
}

function searchCustomer(){
let txt = search.value.toLowerCase();

let filtered = customerData.filter(c =>
c.name.toLowerCase().includes(txt)
);

renderCustomerList(filtered);
}

// ================= SERVICE MENU =================

function showServiceMenu(){
app.innerHTML = `
<div class="card">
<h2>Service Master</h2>

<button class="blue" onclick="showAddService()">Add Service</button>
<button class="blue" onclick="showServiceList()">View Services</button>

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

// ================= SERVICE LIST =================

async function showServiceList(){

app.innerHTML = `
<div class="card">
<h2>Services</h2>

<input id="search" placeholder="Search..." onkeyup="searchService()">
<div id="list"></div>

<button class="gray" onclick="showServiceMenu()">Back</button>
</div>`;

let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_services")
.select("*")
.eq("user_id", userId);

window.serviceData = data;

renderServiceList(data);
}

function renderServiceList(data){
document.getElementById("list").innerHTML = data.map(s=>`
<div class="list-item" onclick="editService('${s.id}')">
${s.name} - ₹${s.rate}
</div>
`).join("");
}

function searchService(){
let txt = search.value.toLowerCase();

let filtered = serviceData.filter(s =>
s.name.toLowerCase().includes(txt)
);

renderServiceList(filtered);
}

</script>
