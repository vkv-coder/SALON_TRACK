<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }

.header {
background:#2563eb;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.menu {
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
background:white;
}

.menu button {
padding:16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
}

.card {
background:white;
padding:18px;
margin:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input, select {
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
}

.tab-btn {
padding:10px;
margin:5px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
}

.footer {
text-align:center;
font-size:13px;
color:#666;
padding:10px;
}
</style>
</head>

<body>

<div class="header">SALON TRACK</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");
let menu = document.getElementById("menu");

// LOGIN
function showLogin(){
menu.innerHTML="";
app.innerHTML=`
<div class="card">
<h2>SALON TRACK</h2>
<input id="mobile" placeholder="Mobile">
<button onclick="login()">Login</button>
</div>`;
}

async function login(){
let { data } = await client.from("users").select("*").eq("mobile", mobile.value).single();
if(!data){alert("User not found");return;}
localStorage.setItem("userId", data.id);
showMenu();
showHome();
}

// MENU
function showMenu(){
menu.innerHTML=`
<div class="menu">
<button onclick="showMaster()">Master</button>
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showReports()">Reports</button>
<button onclick="showReminder()">Reminder</button>
<button onclick="logout()">Logout</button>
</div>
<div class="footer">📧 vkvcoder.support@gmail.com</div>`;
}

function showHome(){
app.innerHTML=`<div class="card">Welcome</div>`;
}

// ================= MASTER =================

function showMaster(){
app.innerHTML=`
<div class="card">
<button class="tab-btn" onclick="showCustomerMaster()">Customer</button>
<button class="tab-btn" onclick="showServiceMaster()">Service</button>

<div id="masterContent"></div>
</div>`;
}

// -------- CUSTOMER --------
async function showCustomerMaster(){

let uid=localStorage.getItem("userId");
let {data}=await client.from("salon_customers").select("*").eq("user_id",uid);

masterContent.innerHTML=`
<h3>Add Customer</h3>
<input id="cname" placeholder="Name">
<input id="cphone" placeholder="Phone">
<input id="cbday" placeholder="Birthday">
<input id="canni" placeholder="Anniversary">
<button onclick="addCustomer()">Add</button>

<hr>

<h3>View Customer</h3>
<select id="custSelect" onchange="loadCustomerDetail()">
<option value="">Select</option>
${(data||[]).map(c=>`<option value="${c.id}">${c.name}</option>`).join("")}
</select>

<div id="custDetail"></div>
`;
}

async function addCustomer(){
await client.from("salon_customers").insert([{
name:cname.value,
phone:cphone.value,
birthday:cbday.value,
anniversary:canni.value,
user_id:localStorage.getItem("userId")
}]);
alert("Added");
showCustomerMaster();
}

async function loadCustomerDetail(){
let id=custSelect.value;
let {data}=await client.from("salon_customers").select("*").eq("id",id).single();

custDetail.innerHTML=`
<input id="ename" value="${data.name}">
<input id="ephone" value="${data.phone}">
<input id="ebday" value="${data.birthday||""}">
<input id="eanni" value="${data.anniversary||""}">
<button onclick="updateCustomer('${data.id}')">Update</button>
`;
}

async function updateCustomer(id){
await client.from("salon_customers").update({
name:ename.value,
phone:ephone.value,
birthday:ebday.value,
anniversary:eanni.value
}).eq("id",id);

alert("Updated");
}

// -------- SERVICE --------
async function showServiceMaster(){

let uid=localStorage.getItem("userId");
let {data}=await client.from("salon_services").select("*").eq("user_id",uid);

masterContent.innerHTML=`
<h3>Add Service</h3>
<input id="sname" placeholder="Service">
<input id="srate" placeholder="Rate">
<button onclick="addService()">Add</button>

<hr>

<h3>View Service</h3>
<select id="servSelect" onchange="loadServiceDetail()">
<option value="">Select</option>
${(data||[]).map(s=>`<option value="${s.id}">${s.name}</option>`).join("")}
</select>

<div id="servDetail"></div>
`;
}

async function addService(){
await client.from("salon_services").insert([{
name:sname.value,
rate:srate.value,
user_id:localStorage.getItem("userId")
}]);
alert("Added");
showServiceMaster();
}

async function loadServiceDetail(){
let id=servSelect.value;
let {data}=await client.from("salon_services").select("*").eq("id",id).single();

servDetail.innerHTML=`
<input id="esname" value="${data.name}">
<input id="esrate" value="${data.rate}">
<button onclick="updateService('${data.id}')">Update</button>
`;
}

async function updateService(id){
await client.from("salon_services").update({
name:esname.value,
rate:esrate.value
}).eq("id",id);

alert("Updated");
}

// ================= OTHER =================

function showAddVisit(){ app.innerHTML="<div class='card'>Add Visit working</div>"; }
function showReports(){ app.innerHTML="<div class='card'>Reports working</div>"; }
function showReminder(){ app.innerHTML="<div class='card'>Reminder working</div>"; }

function logout(){ localStorage.clear(); showLogin(); }

showLogin();

</script>
</body>
</html>
