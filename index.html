<!-- ONLY ADD VISIT PART SHOWN CHANGED -->

<script>

async function showAddVisit(){

let {data:c}=await client.from("salon_customers").select("*");
let {data:s}=await client.from("salon_services").select("*");

app.innerHTML=`
<div class="card">

<h3>Select Customer</h3>
<select id="cust">
${c.map(x=>`<option data-phone="${x.phone}">${x.name}</option>`)}
</select>

<h3>Select Service</h3>

<div id="serviceList">
${s.map(serv=>`
<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #eee;">

<div style="display:flex;align-items:center;gap:10px;">
<input type="checkbox" onchange="calcTotal()">
<span>${serv.name}</span>
</div>

<input type="number" value="${serv.rate}" style="width:70px;" onchange="calcTotal()">

<input type="number" placeholder="Days" style="width:70px;">

</div>
`).join("")}
</div>

<h3>Total ₹ <span id="total">0</span></h3>

<button onclick="saveVisit()">Save</button>

</div>`;
}

function calcTotal(){
let total=0;

document.querySelectorAll("#serviceList > div").forEach(row=>{
let cb=row.children[0].children[0];
let price=row.children[1];

if(cb.checked){
total+=Number(price.value||0);
}
});

document.getElementById("total").innerText=total;
}

// ✅ SAVE WITH REMINDER PER SERVICE
async function saveVisit(){

let customerSelect = document.getElementById("cust");
let customer = customerSelect.value;
let phone = customerSelect.options[customerSelect.selectedIndex].getAttribute("data-phone");

let today = new Date();

let rows = document.querySelectorAll("#serviceList > div");

let inserts=[];

rows.forEach(row=>{
let cb=row.children[0].children[0];
let service=row.children[0].children[1].innerText;
let price=row.children[1].value;
let days=row.children[2].value;

if(cb.checked){

let due = new Date();
due.setDate(today.getDate() + Number(days||0));

inserts.push({
customer_name: customer,
mobile: phone,
service: service,
amount: Number(price||0),
visit_date: today.toISOString().split("T")[0],
reminder_days: Number(days||0),
due_date: due.toISOString().split("T")[0]
});
}
});

if(inserts.length===0){
alert("Select service");
return;
}

let {error}=await client.from("salon_visits").insert(inserts);

if(error){
alert("Error saving");
console.log(error);
}else{
alert("Saved ✅");
showAddVisit();
}
}

</script>
