<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salon App</title>

<style>
body {
font-family: Arial;
background:#f2f2f2;
margin:0;
}

.card {
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

.grid {
display:grid;
grid-template-columns: 1fr 1fr;
gap:10px;
margin-top:10px;
}

button {
padding:12px;
border:none;
border-radius:6px;
}

.blue {
background:#2563eb;
color:white;
}

.gray {
background:#ddd;
width:100%;
margin-top:10px;
}

input, select {
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>

</head>

<body>

<div id="app"></div>

<script>
let app = document.getElementById("app");
// ===== DATA =====
let customers = [];
let services = [
{ name:"Haircut", price:150 },
{ name:"Shaving", price:80 }
];

// ===== HELPERS =====
function formatName(name){
return name.toLowerCase().split(" ").filter(w=>w).map(w=>w[0].toUpperCase()+w.slice(1)).join(" ");
}

function normalize(name){
return name.toLowerCase().replace(/\s+/g,' ').trim();
}

// ===== LOGIN =====
function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile Number">
<button class="blue" onclick="sendOTP()">Send OTP</button>
</div>`;
}

function sendOTP(){
showOTP();
}

function showOTP(){
app.innerHTML = `
<div class="card">
<h2>Enter OTP</h2>
<input id="otp">
<button class="blue" onclick="verifyOTP()">Verify</button>
</div>`;
}

function verifyOTP(){
if(!localStorage.getItem("user")){
app.innerHTML = `
<div class="card">
<h2>Register</h2>

<input id="name" placeholder="Name">
<input id="shop" placeholder="Shop Name">
<input id="city" placeholder="City">
<input id="state" placeholder="State">

<button class="blue" onclick="register()">Register</button>
</div>`;
}else{
showHome();
}
}

function register(){

let name = document.getElementById("name").value;
let shop = document.getElementById("shop").value;
let city = document.getElementById("city").value;
let state = document.getElementById("state").value;

if(!name || !shop || !city || !state){
alert("Please fill all fields");
return;
}

localStorage.setItem("user", name);
localStorage.setItem("shop", shop);
localStorage.setItem("city", city);
localStorage.setItem("state", state);

showHome();
}

// ===== HOME =====
function showHome(){

let name = localStorage.getItem("user");
let shop = localStorage.getItem("shop");

app.innerHTML = `
<div class="card">
<h3>Welcome ${name}</h3>
<p>${shop}</p>

<div class="grid">

<button class="blue" onclick="showVisit()">Add Visit</button>
<button class="blue" onclick="showMaster()">Master</button>

<button class="blue" onclick="showReports()">Reports</button>
<button class="blue" onclick="showReminder()">Reminder</button>

</div>

<button class="gray" onclick="logout()">Logout</button>

</div>
`;
}

// ===== MASTER =====
function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>

<button class="blue" onclick="showCustomerMaster()">Customer Master</button>
<button class="blue" onclick="showServiceMaster()">Service Master</button>

<button class="gray" onclick="showHome()">Back</button>
</div>
`;
}

// ===== CUSTOMER MASTER =====
function showCustomerMaster(){

let list = "";

if(customers.length === 0){
list = "<p>No customers yet</p>";
} else {
list = "<ul>" + customers.map(c => `<li>${c}</li>`).join("") + "</ul>";
}

app.innerHTML = `
<div class="card">
<h2>Customer Master</h2>

${list}

<button class="gray" onclick="showMaster()">Back</button>
</div>
`;
}
  // ===== SERVICE MASTER =====
function showServiceMaster(){
app.innerHTML = `
<div class="card">
<h2>Service Master</h2>

<ul>
${services.map(s=>`<li>${s.name} ₹${s.price}</li>`).join("")}
</ul>

<input id="sname" placeholder="Service Name">
<input id="sprice" placeholder="Price">

<button class="blue" onclick="addService()">Add Service</button>
<button class="gray" onclick="showMaster()">Back</button>
</div>
`;
}

function addService(){
let name=document.getElementById("sname").value;
let price=document.getElementById("sprice").value;

if(!name || !price){
alert("Enter service and price");
return;
}

services.push({name,price});
showServiceMaster();
}

// ===== ADD VISIT =====
function showVisit(){

let today=new Date().toISOString().split("T")[0];

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<select id="custSelect">
<option value="">Select Customer</option>
${customers.map(c=>`<option>${c}</option>`).join("")}
</select>

<input id="custInput" placeholder="Or type new customer">

<h3>Services</h3>
${services.map((s,i)=>`
<label>
<input type="checkbox" value="${i}">
${s.name} ₹${s.price}
</label><br>
`).join("")}

<input type="date" id="date" value="${today}">
<input id="reminder" placeholder="Reminder Days">

<button class="blue" onclick="saveVisit()">Save Visit</button>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== SAVE VISIT =====
function saveVisit(){

let name = document.getElementById("custInput").value || document.getElementById("custSelect").value;

name = formatName(name);

if(!name){
alert("Enter customer name");
return;
}

let exists = customers.find(c => normalize(c) === normalize(name));

if(!exists){
customers.push(name);
}

alert("Visit Saved for " + name);
showHome();
}

// ===== REPORT =====
function showReports(){
app.innerHTML = `
<div class="card">
<h2>Reports</h2>
<p>Today Total: ₹0</p>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== REMINDER =====
function showReminder(){

let shop = localStorage.getItem("shop");
let name = customers[0] || "Customer";
let mobile = "9876543210";

let msg = `Hello ${name},

It’s time to pamper and groom yourself 😊

We would love to welcome you again at ${shop}.

Please visit us at your convenience.

Thank you!`;

let url = "https://wa.me/91"+mobile+"?text="+encodeURIComponent(msg);

app.innerHTML = `
<div class="card">
<h2>Reminder</h2>

<p>${name}</p>
<p>${mobile}</p>

<button class="blue" onclick="window.open('${url}')">WhatsApp</button>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== LOGOUT =====
function logout(){
localStorage.clear();
showLogin();
}

// ===== START =====
showLogin();

</script>

</body>
</html>
