<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

button { padding:12px; border:none; border-radius:6px; }
.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; margin-top:10px; }

input, select {
width:100%; padding:10px; margin:5px 0;
border-radius:6px; border:1px solid #ccc;
}
</style>

</head>

<body>

<div id="app"></div>

<script>

// 🔗 SUPABASE
const SUPABASE_URL = "https://jqqnnkzozjskziaizajg.supabase.co";
const SUPABASE_KEY = "sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let app = document.getElementById("app");

// ================= LOGIN =================

function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile Number">
<button class="blue" onclick="checkLogin()">Continue</button>
</div>`;
}

async function checkLogin(){
let mobile = document.getElementById("mobile").value;

let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile)
.single();

if(data){
localStorage.setItem("currentUser", mobile);
localStorage.setItem("userId", data.id);
showHome();
}else{
showRegister(mobile);
}
}

// ================= REGISTER =================

function showRegister(mobile){
app.innerHTML = `
<div class="card">
<h2>Register</h2>
<input id="name" placeholder="Owner Name">
<input id="shop" placeholder="Shop Name">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<button class="blue" onclick="register('${mobile}')">Register</button>
</div>`;
}

async function register(mobile){

let name = document.getElementById("name").value;
let shop = document.getElementById("shop").value;
let city = document.getElementById("city").value;
let state = document.getElementById("state").value;

let { data } = await client.from("users").insert([{
mobile, name, shop, city, state
}]).select();

localStorage.setItem("currentUser", mobile);
localStorage.setItem("userId", data[0].id);

showHome();
}

// ================= HOME =================

function showHome(){
app.innerHTML = `
<div class="card">
<h3>Salon App</h3>

<div class="grid">
<button class="blue" onclick="showMaster()">Master</button>
<button class="blue" onclick="showAddVisit()">Add Visit</button>
<button class="blue" onclick="showReports()">Reports</button>
<button class="blue" onclick="showReminder()">Reminder</button>
</div>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ================= MASTER =================

function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>

<button class="blue" onclick="showCustomerMaster()">Customer</button>
<button class="blue" onclick="showService()">Service</button>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= CUSTOMER =================

async function showCustomerMaster(){
let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_customers")
.select("*")
.eq("user_id", userId);

app.innerHTML = `
<div class="card">
<h2>Customer Master</h2>

<button class="blue" onclick="showAddCustomer()">+ Add Customer</button>

${data.map(c=>`<p>${c.name}</p>`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

function showAddCustomer(){
app.innerHTML = `
<div class="card">
<h2>Add Customer</h2>

<select id="salutation">
<option>Mr</option>
<option>Ms</option>
</select>

<input id="custName" placeholder="Name">
<input id="custMobile" placeholder="Mobile">

<button class="blue" onclick="saveCustomer()">Save</button>
<button class="gray" onclick="showCustomerMaster()">Back</button>
</div>`;
}

async function saveCustomer(){
let userId = localStorage.getItem("userId");

await client.from("salon_customers").insert([{
user_id: userId,
name: custName.value,
mobile: custMobile.value,
salutation: salutation.value
}]);

alert("Saved");
showCustomerMaster();
}

// ================= SERVICE MASTER =================

async function showService(){

let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_services")
.select("*")
.eq("user_id", userId);

app.innerHTML = `
<div class="card">
<h2>Service Master</h2>

<input id="sname" placeholder="Service Name">
<input id="srate" placeholder="Rate">

<button class="blue" onclick="saveService()">Add Service</button>

<hr>

${data.map(s=>`
<div style="display:flex; justify-content:space-between;">
<span>${s.name}</span>
<span>₹${s.rate}</span>
</div>
`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

async function saveService(){

let userId = localStorage.getItem("userId");

await client.from("salon_services").insert([{
user_id: userId,
name: sname.value,
rate: srate.value
}]);

alert("Service Added");
showService();
}

// ================= ADD VISIT (NEXT STEP) =================

function showAddVisit(){
app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>
<p>Next step</p>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= REPORT =================

function showReports(){
app.innerHTML = `
<div class="card">
<h2>Reports</h2>
<p>Next step</p>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= REMINDER =================

function showReminder(){
app.innerHTML = `
<div class="card">
<h2>Reminder</h2>
<p>Next step</p>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= LOGOUT =================

function logout(){
localStorage.clear();
showLogin();
}

// ================= START =================

if(localStorage.getItem("currentUser")){
showHome();
}else{
showLogin();
}

</script>

</body>
</html>
