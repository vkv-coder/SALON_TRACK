<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }
.header { background:#2563eb;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
.menu { display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;background:white;}
.menu button { padding:16px;border:none;border-radius:10px;background:#2563eb;color:white;font-size:16px;}
.card { background:white;padding:18px;margin:12px;border-radius:12px;}
input,select { width:100%;padding:8px;margin:4px;border-radius:6px;border:1px solid #ccc;}
.footer { text-align:center;font-size:13px;color:#666;padding:10px;}

.row{
display:flex;
align-items:center;
gap:8px;
padding:6px 0;
border-bottom:1px solid #eee;
}

.small{
width:70px;
}
</style>
</head>

<body>

<div class="header">SALON TRACK</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = window.supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app=document.getElementById("app");
let menu=document.getElementById("menu");

// LOGIN
function showLogin(){
menu.innerHTML="";
app.innerHTML=`
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile">
<button onclick="login()">Login</button>
</div>`;
}

async function login(){

let mob = document.getElementById("mobile").value.trim();

if(!mob){
alert("Enter mobile");
return;
}

// 🔥 TEMP BYPASS LOGIN (NO DATABASE)
localStorage.setItem("userId", mob);

showMenu();
showHome();
}
// MENU
function showMenu(){
menu.innerHTML=`
<div class="menu">
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showPrivacy()">Privacy</button>
<button onclick="logout()">Logout</button>
</div>
<div class="footer">📧 vkvcoder.support@gmail.com</div>`;
}

function showHome(){
app.innerHTML=`<div class="card">Welcome</div>`;
}

// ADD VISIT (SAFE VERSION)
async function showAddVisit(){

let {data:c}=await client.from("salon_customers").select("*");
let {data:s}=await client.from("salon_services").select("*");

app.innerHTML=`
<div class="card">

<h3>Customer</h3>
<select id="cust">
${(c||[]).map(x=>`<option data-phone="${x.phone}">${x.name}</option>`)}
</select>

<h3>Services</h3>
<h4 style="text-align:right;margin-right:20px;">Reminder Days</h4>
<div id="list">
${(s||[]).map(serv=>`
<div class="row" style="display:flex;align-items:center;justify-content:flex-start;gap:20px">

  <input type="checkbox" onchange="calcTotal()">

  <span style="width:120px">${serv.name}</span>

  <input class="small" type="number" value="${serv.rate}" onchange="calcTotal()" style="width:80px">

  <input class="small" type="number" placeholder="Days" style="width:80px">

</div>
 
`).join("")}
</div>

<h3>Total ₹ <span id="total">0</span></h3>

<button onclick="saveVisit()">Save</button>

</div>`;
}

function calcTotal(){
let total=0;

document.querySelectorAll("#list .row").forEach(r=>{
let cb=r.children[0];
let price=r.children[2];

if(cb.checked){
total+=Number(price.value||0);
}
});

total && (document.getElementById("total").innerText=total);
}

// SAVE (SAFE)
async function saveVisit(){

let cust=document.getElementById("cust");
let name=cust.value;
let phone=cust.options[cust.selectedIndex].getAttribute("data-phone");

let today=new Date();

let rows=document.querySelectorAll("#list .row");

let data=[];

rows.forEach(r=>{
let cb=r.children[0];
let service=r.children[1].innerText;
let price=r.children[2].value;
let days=r.children[3].value;

if(cb.checked){

let due=new Date();
due.setDate(today.getDate()+Number(days||0));

data.push({
customer_name:name,
mobile:phone,
service:service,
amount:Number(price||0),
visit_date:today.toISOString().split("T")[0],
reminder_days:Number(days||0),
due_date:due.toISOString().split("T")[0]
});
}
});

if(data.length==0){
alert("Select service");
return;
}

let {error}=await client.from("salon_visits").insert(data);

if(error){
alert("Error");
console.log(error);
}else{
alert("Saved ✅");
showAddVisit();
}
}

// PRIVACY
function showPrivacy(){
app.innerHTML=`
<div class="card">
<h3>Privacy</h3>
<b>Think of us as a bank locker — only YOU have the key!</b>
</div>`;
}

// LOGOUT
function logout(){
localStorage.clear();
showLogin();
}

showLogin();

</script>

</body>
</html>
