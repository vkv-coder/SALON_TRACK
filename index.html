<!DOCTYPE html>
<html>
<head>
  <title>Salon Track</title>
</head>

<body>

<h2>Salon Track</h2>

<div id="loginBox">
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="appBox" style="display:none;">
  <h3 id="welcome"></h3>
</div>

<script>
function login() {

  let mobile = document.getElementById("mobile").value;

  if (!mobile) {
    alert("Enter mobile");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let existing = users.find(u => u.mobile === mobile);

  if (existing) {
    alert("Login success");
    showApp(mobile);
  } else {

    let today = new Date();
    let expiry = new Date();
    expiry.setDate(today.getDate() + 7);

    users.push({
      mobile: mobile,
      expiry_date: expiry.toISOString().split('T')[0]
    });

    localStorage.setItem("users", JSON.stringify(users));

    alert("Trial started for 7 days");
    showApp(mobile);
  }
}

function showApp(mobile) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("appBox").style.display = "block";
  document.getElementById("welcome").innerText = "Welcome: " + mobile;
}
</script>

</body>
</html>
