<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }

button { padding:10px; border:none; border-radius:6px; }
.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; margin-top:10px; }

input {
width:100%; padding:8px; margin:5px 0;
border-radius:6px; border:1px solid #ccc;
}

.row { display:flex; justify-content:space-between; align-items:center; margin:5px 0; }
</style>

</head>

<body>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");

// ================= HOME =================

function showHome(){
app.innerHTML = `
<div class="card">
<h3>Salon App</h3>

<button class="blue" onclick="showAddVisit()">Add Visit</button>
<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ================= ADD VISIT =================

async function showAddVisit(){

let userId = localStorage.getItem("userId");

// fetch customers
let { data: customers } = await client
.from("salon_customers")
.select("*")
.eq("user_id", userId);

// fetch services
let { data: services } = await client
.from("salon_services")
.select("*")
.eq("user_id", userId);

window.visitCustomers = customers;
window.visitServices = services;

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<input id="custSearch" placeholder="Search Customer" onkeyup="filterCustomer()">
<div id="custList"></div>

<hr>

<h3>Select Services</h3>

<div id="serviceList"></div>

<hr>

<h3>Total: ₹ <span id="total">0</span></h3>

<input type="date" id="vdate">

<button class="blue" onclick="saveVisit()">Save Visit</button>
<button class="gray" onclick="showHome()">Back</button>
</div>`;

renderCustomerList(customers);
renderServiceList(services);

// default date
document.getElementById("vdate").value =
new Date().toISOString().split("T")[0];
}

// ================= CUSTOMER SELECT =================

function renderCustomerList(data){
document.getElementById("custList").innerHTML = data.map(c=>`
<div onclick="selectCustomer('${c.id}','${c.name}')">
${c.name}
</div>
`).join("");
}

function filterCustomer(){
let txt = custSearch.value.toLowerCase();
let filtered = visitCustomers.filter(c =>
c.name.toLowerCase().includes(txt)
);
renderCustomerList(filtered);
}

function selectCustomer(id,name){
window.selectedCustomer = {id,name};
custSearch.value = name;
document.getElementById("custList").innerHTML = "";
}

// ================= SERVICE CHECKBOX =================

function renderServiceList(data){

document.getElementById("serviceList").innerHTML = data.map(s=>`
<div class="row">
<input type="checkbox" onchange="calcTotal()"
value="${s.id}" id="chk_${s.id}">

<span>${s.name}</span>

<input type="number" value="${s.rate}"
id="rate_${s.id}" onchange="calcTotal()">
</div>
`).join("");
}

// ================= TOTAL =================

function calcTotal(){

let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
let rate = parseFloat(document.getElementById("rate_"+s.id).value || 0);
total += rate;
}
});

document.getElementById("total").innerText = total;
}

// ================= SAVE VISIT =================

async function saveVisit(){

if(!window.selectedCustomer){
alert("Select customer");
return;
}

let selectedServices = [];
let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
let rate = parseFloat(document.getElementById("rate_"+s.id).value || 0);

selectedServices.push({
name: s.name,
rate: rate
});

total += rate;
}
});

await client.from("salon_visits").insert([{
user_id: localStorage.getItem("userId"),
customer_id: selectedCustomer.id,
customer_name: selectedCustomer.name,
services: JSON.stringify(selectedServices),
amount: total,
visit_date: vdate.value
}]);

alert("Visit Saved");

showHome();
}

// ================= LOGIN SIMPLE =================

function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile">
<button onclick="login()">Login</button>
</div>`;
}

async function login(){
let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile.value)
.single();

localStorage.setItem("userId", data.id);

showHome();
}

// ================= LOGOUT =================

function logout(){
localStorage.clear();
showLogin();
}

// START
if(localStorage.getItem("userId")){
showHome();
}else{
showLogin();
}

</script>
</body>
</html>
