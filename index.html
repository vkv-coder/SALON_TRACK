<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

button { padding:10px; border:none; border-radius:6px; }
.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; margin-top:10px; }

input {
width:100%; padding:8px; margin:5px 0;
border-radius:6px; border:1px solid #ccc;
}

.list-item {
padding:10px;
border-bottom:1px solid #eee;
cursor:pointer;
}
</style>

</head>

<body>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");

// LOGIN
function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile">
<button class="blue" onclick="checkLogin()">Continue</button>
</div>`;
}

async function checkLogin(){
let mobile = mobileInput();

let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile)
.single();

if(data){
localStorage.setItem("userId", data.id);
showHome();
}else{
showRegister(mobile);
}
}

function mobileInput(){
return document.getElementById("mobile").value;
}

// REGISTER
function showRegister(mobile){
app.innerHTML = `
<div class="card">
<h2>Register</h2>
<input id="name" placeholder="Name">
<input id="shop" placeholder="Shop">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<button class="blue" onclick="register('${mobile}')">Register</button>
</div>`;
}

async function register(mobile){

let { data } = await client.from("users").insert([{
mobile,
name: name.value,
shop: shop.value,
city: city.value,
state: state.value
}]).select();

localStorage.setItem("userId", data[0].id);

showHome();
}

// HOME
function showHome(){
app.innerHTML = `
<div class="card">
<h3>Salon App</h3>

<div class="grid">
<button class="blue" onclick="showMaster()">Master</button>
<button class="blue">Add Visit</button>
<button class="blue">Reports</button>
<button class="blue">Reminder</button>
</div>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// MASTER
function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>

<button class="blue" onclick="showCustomerMaster()">Customer</button>
<button class="blue" onclick="showService()">Service</button>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= CUSTOMER (CLEAN UI) =================

async function showCustomerMaster(){

let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_customers")
.select("*")
.eq("user_id", userId);

app.innerHTML = `
<div class="card">
<h2>Customers</h2>

<button class="blue" onclick="showAddCustomer()">+ Add Customer</button>

${data.map(c=>`
<div class="list-item" onclick="editCustomer('${c.id}','${c.name}','${c.mobile || ""}','${c.address || ""}')">
${c.name}
</div>
`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

// ADD CUSTOMER
function showAddCustomer(){
app.innerHTML = `
<div class="card">
<h2>Add Customer</h2>

<input id="cname" placeholder="Name">
<input id="cmobile" placeholder="Mobile">
<input id="caddress" placeholder="Address">

<button class="blue" onclick="saveCustomer()">Save</button>
<button class="gray" onclick="showCustomerMaster()">Back</button>
</div>`;
}

// EDIT CUSTOMER
function editCustomer(id,name,mobile,address){
app.innerHTML = `
<div class="card">
<h2>Edit Customer</h2>

<input id="cname" value="${name}">
<input id="cmobile" value="${mobile}">
<input id="caddress" value="${address}">

<button class="blue" onclick="updateCustomer('${id}')">Update</button>
<button class="gray" onclick="showCustomerMaster()">Back</button>
</div>`;
}

// SAVE
async function saveCustomer(){

let userId = localStorage.getItem("userId");

await client.from("salon_customers").insert([{
user_id:userId,
name:cname.value,
mobile:cmobile.value,
address:caddress.value
}]);

showCustomerMaster();
}

// UPDATE
async function updateCustomer(id){

await client
.from("salon_customers")
.update({
name:cname.value,
mobile:cmobile.value,
address:caddress.value
})
.eq("id",id);

showCustomerMaster();
}

// ================= SERVICE (FIXED) =================

async function showService(){

let userId = localStorage.getItem("userId");

let { data, error } = await client
.from("salon_services")
.select("*")
.eq("user_id", userId);

if(error){
alert(error.message);
return;
}

app.innerHTML = `
<div class="card">
<h2>Services</h2>

<button class="blue" onclick="showAddService()">+ Add Service</button>

${data.map(s=>`
<div class="list-item" onclick="editService('${s.id}','${s.name}','${s.rate}')">
${s.name} - ₹${s.rate}
</div>
`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

// ADD SERVICE
function showAddService(){
app.innerHTML = `
<div class="card">
<h2>Add Service</h2>

<input id="sname" placeholder="Name">
<input id="srate" placeholder="Rate">

<button class="blue" onclick="saveService()">Save</button>
<button class="gray" onclick="showService()">Back</button>
</div>`;
}

// EDIT SERVICE
function editService(id,name,rate){
app.innerHTML = `
<div class="card">
<h2>Edit Service</h2>

<input id="sname" value="${name}">
<input id="srate" value="${rate}">

<button class="blue" onclick="updateService('${id}')">Update</button>
<button class="gray" onclick="showService()">Back</button>
</div>`;
}

// SAVE
async function saveService(){

let userId = localStorage.getItem("userId");

await client.from("salon_services").insert([{
user_id:userId,
name:sname.value,
rate:srate.value
}]);

showService();
}

// UPDATE
async function updateService(id){

await client
.from("salon_services")
.update({
name:sname.value,
rate:srate.value
})
.eq("id",id);

showService();
}

// LOGOUT
function logout(){
localStorage.clear();
showLogin();
}

// START
if(localStorage.getItem("userId")){
showHome();
}else{
showLogin();
}

</script>
</body>
</html>
