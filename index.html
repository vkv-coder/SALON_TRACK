<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }

.header {
background:#2563eb;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.menu {
display:flex;
gap:10px;
padding:10px;
background:white;
}

.menu button {
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
}

.card {
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

input {
width:100%;
padding:8px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

.row {
display:flex;
justify-content:space-between;
margin:5px 0;
}
</style>

</head>

<body>

<div class="header">Salon Manager</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");

// ================= MENU =================

function showMenu(){
menu.innerHTML = `
<div class="menu">
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showReports()">Reports</button>
<button onclick="logout()">Logout</button>
</div>`;
}

// ================= LOGIN =================

function showLogin(){
menu.innerHTML = "";
app.innerHTML = `
<div class="card">
<h2 style="text-align:center;">Salon Manager</h2>
<p style="text-align:center;">Manage your salon smartly</p>

<input id="mobile" placeholder="Enter Mobile">

<button onclick="login()" style="width:100%;background:#2563eb;color:white;">Login</button>
</div>`;
}

async function login(){

let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile.value)
.single();

if(!data){
alert("User not found");
return;
}

localStorage.setItem("userId", data.id);

showMenu();
showHome();
}

// ================= HOME =================

function showHome(){
app.innerHTML = `<div class="card">Welcome</div>`;
}

// ================= ADD VISIT =================

async function showAddVisit(){

showMenu();

let userId = localStorage.getItem("userId");

let { data: customers } = await client.from("salon_customers").select("*").eq("user_id", userId);
let { data: services } = await client.from("salon_services").select("*").eq("user_id", userId);

window.visitCustomers = customers;
window.visitServices = services;
window.selectedCustomer = null; // FIX

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<input id="custSearch" placeholder="Search Customer" onkeyup="filterCustomer()">
<div id="custList"></div>

<hr>

<div id="serviceList"></div>

<hr>

<h3>Total ₹ <span id="total">0</span></h3>

<input type="date" id="vdate">

<button onclick="saveVisit()" style="width:100%;background:#2563eb;color:white;">Save Visit</button>
</div>`;

renderCustomerList(customers);
renderServiceList(services);

vdate.value = new Date().toISOString().split("T")[0];
}

// CUSTOMER

function renderCustomerList(data){
custList.innerHTML = data.map(c=>`
<div onclick="selectCustomer('${c.id}','${c.name}')">${c.name}</div>
`).join("");
}

function filterCustomer(){
let txt = custSearch.value.toLowerCase();
renderCustomerList(visitCustomers.filter(c=>c.name.toLowerCase().includes(txt)));
}

function selectCustomer(id,name){
window.selectedCustomer = {id,name};
custSearch.value = name;
custList.innerHTML = "";
}

// SERVICES

function renderServiceList(data){
serviceList.innerHTML = data.map(s=>`
<div class="row">
<input type="checkbox" id="chk_${s.id}" onchange="calcTotal()">
<span>${s.name}</span>
<input type="number" id="rate_${s.id}" value="${s.rate}" onchange="calcTotal()">
</div>
`).join("");
}

// TOTAL

function calcTotal(){
let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
total += parseFloat(document.getElementById("rate_"+s.id).value || 0);
}
});

document.getElementById("total").innerText = total;
}

// SAVE VISIT

async function saveVisit(){

if(!window.selectedCustomer){
alert("Select customer first");
return;
}

let selectedServices = [];
let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){

let rate = parseFloat(document.getElementById("rate_"+s.id).value || 0);

selectedServices.push(`${s.name} ₹${rate}`);
total += rate;
}
});

await client.from("salon_visits").insert([{
user_id: localStorage.getItem("userId"),
customer_name: selectedCustomer.name,
services: selectedServices.join(", "),
amount: total,
visit_date: vdate.value
}]);

alert("Visit Saved");

showAddVisit(); // stay on page
}

// ================= REPORT =================

function showReports(){

showMenu();

app.innerHTML = `
<div class="card">
<h2>Reports</h2>

<button onclick="todayReport()" style="width:100%;background:#2563eb;color:white;">Today</button>

<input type="date" id="from">
<input type="date" id="to">

<button onclick="rangeReport()" style="width:100%;background:#2563eb;color:white;">Date Range</button>

<div id="report"></div>
</div>`;
}

// TODAY

async function todayReport(){

let today = new Date().toISOString().split("T")[0];

let { data } = await client
.from("salon_visits")
.select("*")
.eq("user_id", localStorage.getItem("userId")) // FIX
.eq("visit_date", today);

renderReport(data);
}

// RANGE

async function rangeReport(){

let { data } = await client
.from("salon_visits")
.select("*")
.eq("user_id", localStorage.getItem("userId")) // FIX
.gte("visit_date", from.value)
.lte("visit_date", to.value);

renderReport(data);
}

// RENDER

function renderReport(data){

let total = 0;

report.innerHTML = data.map(v=>{
total += v.amount;

return `
<div class="card">
<b>${v.customer_name}</b><br>
${v.services}<br>
₹${v.amount}
</div>`;
}).join("") + `<h3>Total ₹ ${total}</h3>`;
}

// ================= LOGOUT =================

function logout(){
localStorage.clear();
showLogin();
}

// START

if(localStorage.getItem("userId")){
showMenu();
showHome();
}else{
showLogin();
}

</script>
</body>
</html>
