<!DOCTYPE html>
<html>
<head>
  <title>Salon Track</title>
</head>

<body>

<h2>Salon Track</h2>

<div id="loginBox">
  <input type="text" id="mobile" placeholder="Enter Mobile">
  <button onclick="login()">Login</button>
</div>

<div id="appBox" style="display:none;">
  <h3 id="welcome"></h3>

  <button onclick="alert('Add Customer')">Add Customer</button>
  <button onclick="alert('New Visit')">New Visit</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const client = supabase.createClient(
  "https://txfifgqslatvaiwpbhek.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxcW5ua3pvempza3ppYWl6YWpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5Mjk1ODAsImV4cCI6MjA4ODUwNTU4MH0.sEYeWnm0dvuw8bLSVnQhqmgV8LB-pELjpuVIa3Us1Gg"
);

async function login() {
  let mobile = document.getElementById("mobile").value;

  let { data } = await client
    .from('users')
    .select('*')
    .eq('mobile', mobile)
    .single();

  if (data) {
    localStorage.setItem("mobile", mobile);

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("appBox").style.display = "block";

    document.getElementById("welcome").innerText = "Welcome " + mobile;

  } else {
    let name = prompt("Enter your name");

    if (name) {
      await client.from('users').insert([
        { mobile: mobile, name: name, plan: 'trial', start_date: new Date() }
      ]);

      alert("User created");
    }
  }
}
</script>

</body>
</html>
