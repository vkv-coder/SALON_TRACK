<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

button { padding:10px; border:none; border-radius:6px; }
.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; margin-top:10px; }

input, select {
width:100%; padding:8px; margin:4px 0;
border-radius:6px; border:1px solid #ccc;
}

.row { display:flex; gap:5px; margin:5px 0; }
.row input { flex:1; }
</style>

</head>

<body>
<div id="app"></div>

<script>

const SUPABASE_URL = "https://jqqnnkzozjskziaizajg.supabase.co";
const SUPABASE_KEY = "sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let app = document.getElementById("app");

// ================= LOGIN =================

function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile Number">
<button class="blue" onclick="checkLogin()">Continue</button>
</div>`;
}

async function checkLogin(){
let mobile = mobileInput();

let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile)
.single();

if(data){
localStorage.setItem("userId", data.id);
showHome();
}else{
showRegister(mobile);
}
}

function mobileInput(){
return document.getElementById("mobile").value;
}

// ================= REGISTER =================

function showRegister(mobile){
app.innerHTML = `
<div class="card">
<h2>Register</h2>
<input id="name" placeholder="Owner Name">
<input id="shop" placeholder="Shop Name">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<button class="blue" onclick="register('${mobile}')">Register</button>
</div>`;
}

async function register(mobile){

let { data } = await client.from("users").insert([{
mobile,
name: name.value,
shop: shop.value,
city: city.value,
state: state.value
}]).select();

localStorage.setItem("userId", data[0].id);

showHome();
}

// ================= HOME =================

function showHome(){
app.innerHTML = `
<div class="card">
<h3>Salon App</h3>

<div class="grid">
<button class="blue" onclick="showMaster()">Master</button>
<button class="blue">Add Visit</button>
<button class="blue">Reports</button>
<button class="blue">Reminder</button>
</div>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ================= MASTER =================

function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>

<button class="blue" onclick="showCustomerMaster()">Customer</button>
<button class="blue" onclick="showService()">Service</button>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ================= CUSTOMER MASTER (IMPROVED) =================

async function showCustomerMaster(){

let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_customers")
.select("*")
.eq("user_id", userId);

app.innerHTML = `
<div class="card">
<h2>Customer Master</h2>

<h4>Add New Customer</h4>
<input id="cname" placeholder="Name">
<input id="cmobile" placeholder="Mobile">
<input id="caddress" placeholder="Address">
<button class="blue" onclick="saveCustomer()">Add Customer</button>

<hr>

<h4>Existing Customers</h4>

${data.map(c=>`
<div class="row">
<input value="${c.name}" disabled>
<input id="mob_${c.id}" value="${c.mobile || ""}">
<input id="add_${c.id}" value="${c.address || ""}">
<button onclick="updateCustomer('${c.id}')">Update</button>
</div>
`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

async function saveCustomer(){

let userId = localStorage.getItem("userId");

await client.from("salon_customers").insert([{
user_id: userId,
name: cname.value,
mobile: cmobile.value,
address: caddress.value
}]);

alert("Customer Added");
showCustomerMaster();
}

async function updateCustomer(id){

let mobile = document.getElementById("mob_"+id).value;
let address = document.getElementById("add_"+id).value;

await client
.from("salon_customers")
.update({ mobile, address })
.eq("id", id);

alert("Updated");
showCustomerMaster();
}

// ================= SERVICE MASTER =================

async function showService(){

let userId = localStorage.getItem("userId");

let { data } = await client
.from("salon_services")
.select("*")
.eq("user_id", userId);

app.innerHTML = `
<div class="card">
<h2>Service Master</h2>

<input id="sname" placeholder="Service Name">
<input id="srate" placeholder="Rate">
<button class="blue" onclick="saveService()">Add Service</button>

<hr>

${data.map(s=>`
<div class="row">
<input value="${s.name}" disabled>
<input id="rate_${s.id}" value="${s.rate}">
<button onclick="updateService('${s.id}')">Update</button>
</div>
`).join("")}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

async function saveService(){

let userId = localStorage.getItem("userId");

await client.from("salon_services").insert([{
user_id: userId,
name: sname.value,
rate: srate.value
}]);

alert("Service Added");
showService();
}

async function updateService(id){

let rate = document.getElementById("rate_"+id).value;

await client
.from("salon_services")
.update({ rate })
.eq("id", id);

alert("Updated");
showService();
}

// ================= LOGOUT =================

function logout(){
localStorage.clear();
showLogin();
}

// ================= START =================

if(localStorage.getItem("userId")){
showHome();
}else{
showLogin();
}

</script>

</body>
</html>
