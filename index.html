<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salon App</title>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }

.card {
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

.grid {
display:grid;
grid-template-columns: 1fr 1fr;
gap:10px;
margin-top:10px;
}

button {
padding:12px;
border:none;
border-radius:6px;
}

.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; margin-top:10px; }

input, select {
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

table { width:100%; border-collapse:collapse; }
td, th { padding:8px; border-bottom:1px solid #ddd; text-align:left; }
</style>

</head>

<body>

<div id="app"></div>

<script>

let app = document.getElementById("app");

// ===== DATA =====
let customers = JSON.parse(localStorage.getItem("customers")) || [];
let services = JSON.parse(localStorage.getItem("services")) || [
{ name:"Haircut", price:150 },
{ name:"Shaving", price:80 }
];
let visits = JSON.parse(localStorage.getItem("visits")) || [];

// ===== HELPERS =====
function formatName(name){
return name.toLowerCase().split(" ").filter(w=>w).map(w=>w[0].toUpperCase()+w.slice(1)).join(" ");
}
function normalize(name){
return name.toLowerCase().replace(/\s+/g,' ').trim();
}
function val(id){ return document.getElementById(id).value; }

// ===== LOGIN =====
function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile Number">
<button class="blue" onclick="sendOTP()">Send OTP</button>
</div>`;
}
function sendOTP(){ showOTP(); }

function showOTP(){
app.innerHTML = `
<div class="card">
<h2>Enter OTP</h2>
<input id="otp">
<button class="blue" onclick="verifyOTP()">Verify</button>
</div>`;
}

function verifyOTP(){
if(!localStorage.getItem("user")){
app.innerHTML = `
<div class="card">
<h2>Register</h2>
<input id="name" placeholder="Name">
<input id="shop" placeholder="Shop Name">
<input id="city" placeholder="City">
<input id="state" placeholder="State">
<button class="blue" onclick="register()">Register</button>
</div>`;
}else showHome();
}

function register(){
let name=val("name"), shop=val("shop"), city=val("city"), state=val("state");
if(!name||!shop||!city||!state){ alert("Fill all fields"); return; }

localStorage.setItem("user",name);
localStorage.setItem("shop",shop);
showHome();
}

// ===== HOME =====
function showHome(){
let name=localStorage.getItem("user");
let shop=localStorage.getItem("shop");

app.innerHTML = `
<div class="card">
<h3>Welcome ${name}</h3>
<p>${shop}</p>

<div class="grid">
<button class="blue" onclick="showVisit()">Add Visit</button>
<button class="blue" onclick="showMaster()">Master</button>
<button class="blue" onclick="showReports()">Reports</button>
<button class="blue" onclick="showReminder()">Reminder</button>
</div>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ===== MASTER =====
function showMaster(){
app.innerHTML = `
<div class="card">
<h2>Master</h2>
<button class="blue" onclick="showCustomerMaster()">Customer Master</button>
<button class="blue" onclick="showServiceMaster()">Service Master</button>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== CUSTOMER MASTER =====
function showCustomerMaster(){

let list = customers.length===0
? "<p>No customers yet</p>"
: `<table>
<tr><th>Name</th><th>Mobile</th></tr>
${customers.map(c=>`
<tr><td>${c.name}</td><td>${c.mobile}</td></tr>`).join("")}
</table>`;

app.innerHTML = `
<div class="card">
<h2>Customer Master</h2>

<button class="blue" onclick="showAddCustomer()">+ Add Customer</button>

${list}

<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

function showAddCustomer(){
app.innerHTML = `
<div class="card">
<h2>Add Customer</h2>

<input id="custName" placeholder="Name">
<input id="custMobile" placeholder="Mobile No">
<input id="custAddress" placeholder="Address (optional)">

<button class="blue" onclick="saveCustomer()">Save</button>
<button class="gray" onclick="showCustomerMaster()">Back</button>
</div>`;
}

function saveCustomer(){

let name=formatName(val("custName"));
let mobile=val("custMobile");
let address=val("custAddress");

if(!name||!mobile){ alert("Name & Mobile required"); return; }

let exists = customers.find(c=>normalize(c.name)===normalize(name));

if(!exists){
customers.push({name,mobile,address});
localStorage.setItem("customers",JSON.stringify(customers));
}

showCustomerMaster();
}

// ===== SERVICE MASTER =====
function showServiceMaster(){
app.innerHTML = `
<div class="card">
<h2>Service Master</h2>

<ul>
${services.map(s=>`<li>${s.name} ₹${s.price}</li>`).join("")}
</ul>

<input id="sname" placeholder="Service Name">
<input id="sprice" placeholder="Price">

<button class="blue" onclick="addService()">Add Service</button>
<button class="gray" onclick="showMaster()">Back</button>
</div>`;
}

function addService(){
let name=val("sname"), price=val("sprice");
if(!name||!price){ alert("Fill all"); return; }

services.push({name,price});
localStorage.setItem("services",JSON.stringify(services));
showServiceMaster();
}

// ===== ADD VISIT =====
function showVisit(){

let today=new Date().toISOString().split("T")[0];

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<input id="custInput" placeholder="Customer Name">

<h3>Services</h3>
${services.map((s,i)=>`
<label>
<input type="checkbox" value="${i}">
${s.name} ₹${s.price}
</label><br>`).join("")}

<input type="date" id="date" value="${today}">
<input id="reminder" placeholder="Reminder Days">

<button class="blue" onclick="saveVisit()">Save Visit</button>
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== SAVE VISIT =====
function saveVisit(){

let name=formatName(val("custInput"));
let date=val("date");
let reminderDays=parseInt(val("reminder")||0);

if(!name){ alert("Enter customer"); return; }

// services
let selected=[];
document.querySelectorAll("input[type=checkbox]:checked").forEach(cb=>{
selected.push(services[cb.value]);
});

let total=selected.reduce((s,x)=>s+Number(x.price),0);

// customer auto create
let exists=customers.find(c=>normalize(c.name)===normalize(name));
if(!exists){
customers.push({name,mobile:"",address:""});
localStorage.setItem("customers",JSON.stringify(customers));
}

// save visit
visits.push({name,date,services:selected,total,reminderDays});
localStorage.setItem("visits",JSON.stringify(visits));

alert("Visit Saved ₹"+total);
showHome();
}

// ===== REPORT =====
function showReports(){

app.innerHTML = `
<div class="card">
<h2>Reports</h2>

<button class="blue" onclick="todayReport()">Today</button>

<input type="date" id="from">
<input type="date" id="to">
<button class="blue" onclick="rangeReport()">Show</button>

<button class="blue" onclick="downloadCSV()">Download CSV</button>

<div id="report"></div>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

function todayReport(){
let today=new Date().toISOString().split("T")[0];
render(visits.filter(v=>v.date===today));
}

function rangeReport(){
let from=val("from"), to=val("to");
render(visits.filter(v=>v.date>=from && v.date<=to));
}

function render(list){
let total=list.reduce((s,v)=>s+v.total,0);

document.getElementById("report").innerHTML=`
<p>Total Visits: ${list.length}</p>
<p>Total Amount: ₹${total}</p>

<table>
<tr><th>Name</th><th>Date</th><th>Amount</th></tr>
${list.map(v=>`
<tr><td>${v.name}</td><td>${v.date}</td><td>${v.total}</td></tr>`).join("")}
</table>`;
}

function downloadCSV(){
let rows=[["Name","Date","Amount"]];
visits.forEach(v=>rows.push([v.name,v.date,v.total]));

let csv=rows.map(r=>r.join(",")).join("\n");

let blob=new Blob([csv],{type:"text/csv"});
let url=URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="report.csv";
a.click();
}

// ===== REMINDER =====
function showReminder(){

let today=new Date();

let list=visits.filter(v=>{
let d=new Date(v.date);
let next=new Date(d);
next.setDate(next.getDate()+v.reminderDays);

let r=new Date(next);
r.setDate(r.getDate()-3);

return r.toDateString()===today.toDateString();
});

let html=list.length===0?"<p>No reminders</p>":
list.map(v=>{
let c=customers.find(x=>x.name===v.name)||{};
let msg=`Hello ${v.name},

It’s time to pamper and groom yourself 😊`;

let url="https://wa.me/91"+(c.mobile||"")+"?text="+encodeURIComponent(msg);

return `
<div class="card">
<p>${v.name}</p>
<p>${c.mobile||""}</p>
<button class="blue" onclick="window.open('${url}')">WhatsApp</button>
</div>`;
}).join("");

app.innerHTML=`
<div class="card">
<h2>Reminder</h2>
${html}
<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// ===== LOGOUT =====
function logout(){
localStorage.clear();
showLogin();
}

// START
showLogin();

</script>

</body>
</html>
