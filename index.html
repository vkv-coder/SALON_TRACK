<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; }
.card { background:white; padding:15px; margin:10px; border-radius:10px; }

button { padding:10px; border:none; border-radius:6px; margin:5px 0; }
.blue { background:#2563eb; color:white; }
.gray { background:#ddd; width:100%; }

input {
width:100%; padding:8px; margin:5px 0;
border-radius:6px; border:1px solid #ccc;
}

.row { border-bottom:1px solid #eee; padding:8px 0; }
.small { font-size:12px; color:gray; }
</style>

</head>

<body>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");

// ================= HOME =================

function showHome(){
app.innerHTML = `
<div class="card">
<h3>Salon App</h3>

<button class="blue" onclick="showAddVisit()">Add Visit</button>
<button class="blue" onclick="showReports()">Reports</button>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ================= ADD VISIT (same as before) =================

async function showAddVisit(){

let userId = localStorage.getItem("userId");

let { data: customers } = await client.from("salon_customers").select("*").eq("user_id", userId);
let { data: services } = await client.from("salon_services").select("*").eq("user_id", userId);

window.visitCustomers = customers;
window.visitServices = services;

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<input id="custSearch" placeholder="Search Customer" onkeyup="filterCustomer()">
<div id="custList"></div>

<hr>

<div id="serviceList"></div>

<hr>

<h3>Total ₹ <span id="total">0</span></h3>

<input type="date" id="vdate">

<button class="blue" onclick="saveVisit()">Save Visit</button>
<button class="gray" onclick="showHome()">Back</button>
</div>`;

renderCustomerList(customers);
renderServiceList(services);

vdate.value = new Date().toISOString().split("T")[0];
}

// CUSTOMER
function renderCustomerList(data){
custList.innerHTML = data.map(c=>`
<div onclick="selectCustomer('${c.id}','${c.name}')">${c.name}</div>
`).join("");
}

function filterCustomer(){
let txt = custSearch.value.toLowerCase();
renderCustomerList(visitCustomers.filter(c=>c.name.toLowerCase().includes(txt)));
}

function selectCustomer(id,name){
window.selectedCustomer = {id,name};
custSearch.value = name;
custList.innerHTML = "";
}

// SERVICES
function renderServiceList(data){
serviceList.innerHTML = data.map(s=>`
<div>
<input type="checkbox" id="chk_${s.id}" onchange="calcTotal()">
${s.name}
<input type="number" id="rate_${s.id}" value="${s.rate}" onchange="calcTotal()">
</div>
`).join("");
}

// TOTAL
function calcTotal(){
let total = 0;
visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk.checked){
total += parseFloat(document.getElementById("rate_"+s.id).value || 0);
}
});
totalEl = document.getElementById("total");
if(totalEl) totalEl.innerText = total;
}

// SAVE
async function saveVisit(){

let selectedServices = [];
let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk.checked){
let rate = parseFloat(document.getElementById("rate_"+s.id).value || 0);

selectedServices.push(`${s.name} ₹${rate}`);
total += rate;
}
});

await client.from("salon_visits").insert([{
user_id: localStorage.getItem("userId"),
customer_name: selectedCustomer.name,
services: selectedServices.join(", "),
amount: total,
visit_date: vdate.value
}]);

alert("Saved");
showHome();
}

// ================= REPORT =================

function showReports(){
app.innerHTML = `
<div class="card">
<h2>Reports</h2>

<button class="blue" onclick="todayReport()">Today</button>

<input type="date" id="from">
<input type="date" id="to">

<button class="blue" onclick="rangeReport()">Date Range</button>

<div id="report"></div>

<button class="gray" onclick="showHome()">Back</button>
</div>`;
}

// TODAY
async function todayReport(){

let today = new Date().toISOString().split("T")[0];

let { data } = await client
.from("salon_visits")
.select("*")
.eq("visit_date", today);

renderReport(data);
}

// RANGE
async function rangeReport(){

let { data } = await client
.from("salon_visits")
.select("*")
.gte("visit_date", from.value)
.lte("visit_date", to.value);

renderReport(data);
}

// RENDER REPORT
function renderReport(data){

let total = 0;

report.innerHTML = data.map(v=>{
total += v.amount;

return `
<div class="row">
<b>${v.customer_name}</b><br>
<span class="small">${v.services}</span><br>
₹${v.amount}
</div>`;
}).join("") + `<h3>Total ₹ ${total}</h3>`;
}

// ================= LOGIN =================

function showLogin(){
app.innerHTML = `<div class="card"><input id="mobile"><button onclick="login()">Login</button></div>`;
}

async function login(){
let { data } = await client.from("users").select("*").eq("mobile", mobile.value).single();
localStorage.setItem("userId", data.id);
showHome();
}

// ================= LOGOUT =================

function logout(){
localStorage.clear();
showLogin();
}

// START
if(localStorage.getItem("userId")){
showHome();
}else{
showLogin();
}

</script>
</body>
</html>
