<script>

let app = document.getElementById("app");

// ===== DATA =====
let users = JSON.parse(localStorage.getItem("users")) || {}; // mobile आधारित
let customers = JSON.parse(localStorage.getItem("customers")) || [];
let services = JSON.parse(localStorage.getItem("services")) || [
{ name:"Haircut", price:150 },
{ name:"Shaving", price:80 }
];
let visits = JSON.parse(localStorage.getItem("visits")) || [];

function val(id){ return document.getElementById(id).value; }

// ===== LOGIN =====
function showLogin(){
app.innerHTML = `
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile Number">
<button class="blue" onclick="checkLogin()">Continue</button>
</div>`;
}

function checkLogin(){

let mobile = val("mobile");

if(!mobile){
alert("Enter mobile number");
return;
}

// check user by mobile
if(users[mobile]){
localStorage.setItem("currentUser", mobile);
showHome();
}else{
showRegister(mobile);
}
}

// ===== REGISTER =====
function showRegister(mobile){
app.innerHTML = `
<div class="card">
<h2>Register</h2>

<input id="name" placeholder="Name">
<input id="shop" placeholder="Shop Name">
<input id="city" placeholder="City">
<input id="state" placeholder="State">

<button class="blue" onclick="register('${mobile}')">Register</button>
</div>`;
}

function register(mobile){

let name = val("name");
let shop = val("shop");
let city = val("city");
let state = val("state");

if(!name || !shop || !city || !state){
alert("Fill all fields");
return;
}

// store user by mobile
users[mobile] = { name, shop, city, state };

localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", mobile);

showHome();
}

// ===== HOME =====
function showHome(){

let mobile = localStorage.getItem("currentUser");
let user = users[mobile];

app.innerHTML = `
<div class="card">
<h3>${user.shop}</h3>

<div class="grid">
<button class="blue" onclick="showVisit()">Add Visit</button>
<button class="blue" onclick="showMaster()">Master</button>
<button class="blue" onclick="showReports()">Reports</button>
<button class="blue" onclick="showReminder()">Reminder</button>
</div>

<button class="gray" onclick="logout()">Logout</button>
</div>`;
}

// ===== LOGOUT =====
function logout(){
localStorage.removeItem("currentUser");
showLogin();
}

// START
showLogin();

</script>
