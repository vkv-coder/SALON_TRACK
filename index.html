<!DOCTYPE html>
<html>
<head>
  <title>Salon Track</title>
</head>

<body>

<h2>Salon Track</h2>

<input type="text" id="mobile" placeholder="Enter Mobile">
<button id="loginBtn">Login</button>

<!-- Supabase v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

// 🔴 REPLACE THIS WITH YOUR VALUES
const SUPABASE_URL = "https://txfifgqslatvaiwpbhek.supabase.co";
const SUPABASE_KEY = "sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Button click
document.getElementById("loginBtn").addEventListener("click", login);

async function login() {

  let mobile = document.getElementById("mobile").value;

  if (!mobile) {
    alert("Enter mobile number");
    return;
  }

  // Check user
  const { data, error } = await client
    .from('users')
    .select('*')
    .eq('mobile', mobile);

  console.log("SELECT:", data, error);

  if (error) {
    alert("Error: " + error.message);
    return;
  }

  // New user
  if (!data || data.length === 0) {

    let today = new Date();
    let expiry = new Date();
    expiry.setDate(today.getDate() + 7);

    const { error: insertError } = await client
      .from('users')
      .insert([
        {
          mobile: mobile,
          start_date: today.toISOString().split('T')[0],
          expiry_date: expiry.toISOString().split('T')[0]
        }
      ]);

    console.log("INSERT:", insertError);

    if (insertError) {
      alert("Insert Error: " + insertError.message);
      return;
    }

    alert("Trial started for 7 days");

  } else {
    alert("Login success");
  }
}

</script>

</body>
</html>
