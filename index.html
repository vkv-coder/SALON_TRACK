<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }
.header { background:#2563eb;color:white;padding:18px;text-align:center;font-size:22px;font-weight:bold;}
.menu { display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;background:white;}
.menu button { padding:16px;border:none;border-radius:10px;background:#2563eb;color:white;font-size:16px;}
.card { background:white;padding:18px;margin:12px;border-radius:12px;}
input,select { width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;}
.row { display:flex;gap:10px;}
.tab-btn { padding:10px;margin:5px;background:#2563eb;color:white;border:none;border-radius:8px;}
.footer { text-align:center;font-size:13px;color:#666;padding:10px;}
</style>
</head>

<body>

<div class="header">SALON TRACK</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = window.supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app=document.getElementById("app");
let menu=document.getElementById("menu");

let visitCustomers=[], visitServices=[], selectedCustomer=null;

// ================= LOGIN =================
function showLogin(){
menu.innerHTML="";
app.innerHTML=`
<div class="card">
<h2>Login</h2>
<input id="mobile" placeholder="Mobile">
<button onclick="login()">Login</button>
</div>`;
}

async function login(){
let mob=document.getElementById("mobile").value.trim();
if(!mob){alert("Enter mobile");return;}

let {data}=await client.from("users").select("*").eq("mobile",mob).limit(1);

let user;

if(!data || data.length==0){
let {data:newUser}=await client.from("users").insert([{mobile:mob,name:"User"}]).select();
user=newUser[0];
}else{
user=data[0];
}

localStorage.setItem("userId",user.id);
showMenu(); showHome();
}

// ================= MENU =================
function showMenu(){
menu.innerHTML=`
<div class="menu">
<button onclick="showMaster()">Master</button>
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showReports()">Reports</button>
<button onclick="showReminder()">Reminder</button>
<button onclick="showPrivacy()">Privacy</button>
<button onclick="logout()">Logout</button>
</div>
<div class="footer">📧 vkvcoder.support@gmail.com</div>`;
}

function showHome(){
app.innerHTML=`<div class="card">Welcome</div>`;
}

// ================= MASTER =================
function showMaster(){
app.innerHTML=`
<div class="card">
<button class="tab-btn" onclick="showCustomer()">Customer</button>
<button class="tab-btn" onclick="showService()">Service</button>

</div>`;
}

<button onclick="addCustomer()">Add</button>

async function saveCustomer(){
await client.from("salon_customers").insert([{
name:name.value,phone:phone.value,address:address.value
}]);
alert("Saved");
}

async function viewCustomer(){
let {data}=await client.from("salon_customers").select("*");
sub.innerHTML=data.map(c=>`<div>${c.name} - ${c.phone}</div>`).join("");

// SERVICE
function showService(){
content.innerHTML=`
<button onclick="addService()">Add</button>
<button onclick="viewService()">View</button>
<div id="sub"></div>`;
}

function addService(){
sub.innerHTML=`
<div class="row">
<input id="sname" placeholder="Service">
<input id="srate" placeholder="Price">
</div>
<button onclick="saveService()">Save</button>`;
}

async function saveService(){
await client.from("salon_services").insert([{
name:sname.value,rate:srate.value
}]);
alert("Saved");
}

async function viewService(){
let {data}=await client.from("salon_services").select("*");
sub.innerHTML=data.map(s=>`<div>${s.name} ₹${s.rate}</div>`).join("");
}

// ================= ADD VISIT =================
async function showAddVisit(){
let {data:c}=await client.from("salon_customers").select("*");
let {data:s}=await client.from("salon_services").select("*");

visitCustomers=c||[];
visitServices=s||[];

app.innerHTML=`
<div class="card">
<h3>Select Customer</h3>
<select id="cust">
${visitCustomers.map(x=>`<option>${x.name}</option>`)}
</select>

<h3>Select Service</h3>
${visitServices.map(s=>`
<div>
<input type="checkbox" id="c${s.id}">${s.name} ₹${s.rate}
</div>`).join("")}

<button onclick="saveVisit()">Save</button>
</div>`;

async function saveVisit(){
alert("Visit Saved");
}

async function showReports(){
let {data}=await client.from("salon_visits").select("*");

app.innerHTML=`

<h2>Reports</h2>
${(data||[]).map(v=>`<div>${v.customer_name} ₹${v.amount}</div>`).join("")}
</div>`;
}

// ================= REMINDER =================
function showReminder(){
app.innerHTML=`<div class="card">Reminder coming soon</div>`;
}

// ================= PRIVACY =================
function showPrivacy(){
app.innerHTML=`
<div class="card">
<h2>🔒 Privacy Policy</h2>
<div style="background:#2563eb;color:white;padding:10px;border-radius:10px;text-align:center;">
Think of us as a bank locker — only YOU have the key!
</div>
</div>`;
}

// ================= LOGOUT =================
function logout(){
localStorage.clear();
showLogin();
}

showLogin();

</script>
</body>
</html>
