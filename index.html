<!DOCTYPE html>
<html>
<head>
<title>Salon Track</title>
<style>
.green{
background: green;
color: white;
padding: 10px;
border: none;
margin-top: 10px;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

// ✅ SHOW VISIT FORM
function showVisitForm(){

let div = document.getElementById("app");

div.innerHTML = `
<h2>Add Visit</h2>

<input id="visit_customer" placeholder="Customer Name"><br><br>

<select id="visit_service">
<option>Haircut</option>
<option>Shave</option>
<option>Facial</option>
</select><br><br>

<input id="visit_amount" type="number" placeholder="Amount"><br><br>
<input id="visit_date" type="date"><br><br>

<button id="saveBtn" class="green">Save Visit</button>
<button onclick="back()">Back</button>
`;

setTimeout(() => {
let btn = document.getElementById("saveBtn");
if(btn){
btn.addEventListener("click", saveVisit);
}
}, 100);

}


// ✅ SAVE VISIT
async function saveVisit(){

alert("clicked");   // confirm button working

let name = document.getElementById("visit_customer").value;
let service = document.getElementById("visit_service").value;
let amount = document.getElementById("visit_amount").value;
let date = document.getElementById("visit_date").value;

// ⚠️ TEMP: comment API if not configured
/*
let {error} = await client.from('salon_visits').insert([{
customer_name:name,
service:service,
amount:amount,
visit_date:date
}]);

if(error){
alert(error.message);
return;
}
*/

alert("Visit Saved");

back();
}


// ✅ BACK FUNCTION
function back(){
document.getElementById("app").innerHTML = `
<h2>Home</h2>
<button onclick="showVisitForm()" class="green">Add Visit</button>
`;
}


// ✅ START APP
back();

</script>

</body>
</html>
