<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body { font-family: Arial; margin:0; background:#f2f2f2; }

.header {
background:#2563eb;
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
}

.menu {
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
background:white;
}

.menu button {
padding:10px;
border:none;
border-radius:6px;
background:#2563eb;
color:white;
}

.card {
background:white;
padding:15px;
margin:10px;
border-radius:10px;
}

input {
width:100%;
padding:10px;
margin:5px 0;
border-radius:6px;
border:1px solid #ccc;
}

.row { margin:5px 0; }

</style>
</head>

<body>

<div class="header">Salon Manager</div>
<div id="menu"></div>
<div id="app"></div>

<script>

const client = supabase.createClient(
"https://jqqnnkzozjskziaizajg.supabase.co",
"sb_publishable_XDHJ55QPN6R9Hw8ikMerNQ_QNFX_z0P"
);

let app = document.getElementById("app");

// ================= LOGIN =================

function showLogin(){
menu.innerHTML = "";
app.innerHTML = `
<div class="card">
<h2 style="text-align:center;">Salon Manager</h2>

<input id="mobile" placeholder="Mobile">

<button onclick="login()" style="width:100%;background:#2563eb;color:white;">Login</button>
</div>`;
}

async function login(){

let { data } = await client
.from("users")
.select("*")
.eq("mobile", mobile.value)
.single();

if(!data){
alert("User not found");
return;
}

localStorage.setItem("userId", data.id);
localStorage.setItem("userName", data.name || "");
localStorage.setItem("shopName", data.shop || "");

showMenu();
showHome();
}

// ================= MENU =================

function showMenu(){
menu.innerHTML = `
<div class="menu">
<button onclick="showMaster()">Master</button>
<button onclick="showAddVisit()">Add Visit</button>
<button onclick="showReports()">Reports</button>
<button onclick="showReminder()">Reminder</button>
<button onclick="showSupport()">Support</button>
<button onclick="logout()">Logout</button>
</div>`;
}

// ================= HOME =================

function showHome(){
app.innerHTML = `
<div class="card">
<h3>Welcome, ${localStorage.getItem("userName")}</h3>
<p>${localStorage.getItem("shopName")}</p>
</div>`;
}

// ================= ADD VISIT =================

async function showAddVisit(){

let userId = localStorage.getItem("userId");

let { data: customers } = await client.from("salon_customers").select("*").eq("user_id", userId);
let { data: services } = await client.from("salon_services").select("*").eq("user_id", userId);

window.visitCustomers = customers;
window.visitServices = services;
window.selectedCustomer = null;

app.innerHTML = `
<div class="card">
<h2>Add Visit</h2>

<input id="custSearch" placeholder="Search Customer" onkeyup="filterCustomer()">
<div id="custList"></div>

<hr>

<div id="serviceList"></div>

<hr>

<h3>Total ₹ <span id="total">0</span></h3>

<input type="date" id="vdate">

<input id="remDays" type="number" placeholder="Reminder Days (e.g. 30)">

<button onclick="saveVisit()" style="width:100%;background:#2563eb;color:white;">Save Visit</button>
</div>`;

renderCustomerList(customers);
renderServiceList(services);

vdate.value = new Date().toISOString().split("T")[0];
}

// CUSTOMER

function renderCustomerList(data){
custList.innerHTML = data.map(c=>`
<div onclick="selectCustomer('${c.id}','${c.name}')">${c.name}</div>
`).join("");
}

function filterCustomer(){
let txt = custSearch.value.toLowerCase();
renderCustomerList(visitCustomers.filter(c=>c.name.toLowerCase().includes(txt)));
}

function selectCustomer(id,name){
window.selectedCustomer = {id,name};
custSearch.value = name;
custList.innerHTML = "";
}

// SERVICES

function renderServiceList(data){
serviceList.innerHTML = data.map(s=>`
<div class="row">
<input type="checkbox" id="chk_${s.id}" onchange="calcTotal()">
${s.name}
<input type="number" value="${s.rate}" id="rate_${s.id}" onchange="calcTotal()">
</div>
`).join("");
}

// TOTAL

function calcTotal(){
let total = 0;

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
total += parseFloat(document.getElementById("rate_"+s.id).value || 0);
}
});

document.getElementById("total").innerText = total;
}

// SAVE VISIT

async function saveVisit(){

if(!window.selectedCustomer){
alert("Select customer");
return;
}

let total = 0;
let services = [];

visitServices.forEach(s=>{
let chk = document.getElementById("chk_"+s.id);
if(chk && chk.checked){
let rate = parseFloat(document.getElementById("rate_"+s.id).value || 0);
services.push(`${s.name} ₹${rate}`);
total += rate;
}
});

// REMINDER DATE
let reminderDate = null;

if(remDays.value){
let d = new Date(vdate.value);
d.setDate(d.getDate() + parseInt(remDays.value));
reminderDate = d.toISOString().split("T")[0];
}

await client.from("salon_visits").insert([{
user_id: localStorage.getItem("userId"),
customer_name: selectedCustomer.name,
services: services.join(", "),
amount: total,
visit_date: vdate.value,
reminder_date: reminderDate
}]);

alert("Saved");

showAddVisit();
}

// ================= REMINDER =================

async function showReminder(){

let today = new Date().toISOString().split("T")[0];

let { data } = await client
.from("salon_visits")
.select("*")
.eq("user_id", localStorage.getItem("userId"))
.lte("reminder_date", today);

app.innerHTML = `
<div class="card">
<h2>Reminders</h2>

${data.map(v=>`
<div class="card">
<b>${v.customer_name}</b><br>
Due: ${v.reminder_date}
</div>
`).join("")}

</div>`;
}

// ================= REPORT =================

function showReports(){
app.innerHTML = `<div class="card">Reports working (already built)</div>`;
}

// ================= SUPPORT =================

function showSupport(){
app.innerHTML = `<div class="card">vkvcoder.support@gmail.com</div>`;
}

// ================= MASTER =================

function showMaster(){
app.innerHTML = `<div class="card">Master next step</div>`;
}

// ================= LOGOUT =================

function logout(){
localStorage.clear();
showLogin();
}

// START
showLogin();

</script>
</body>
</html>
