<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c1917"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fde68a"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg2)"/>

  <!-- Decorative border ring -->
  <rect x="18" y="18" width="476" height="476" rx="88" ry="88" fill="none"
        stroke="url(#gold)" stroke-width="3" opacity="0.5"/>

  <!-- Scissors - top blade -->
  <g transform="translate(256,220) rotate(-30)">
    <ellipse cx="0" cy="-70" rx="12" ry="55" fill="url(#gold)" rx="6"/>
    <circle cx="0" cy="-128" r="20" fill="none" stroke="url(#gold)" stroke-width="12"/>
  </g>

  <!-- Scissors - bottom blade -->
  <g transform="translate(256,220) rotate(30)">
    <ellipse cx="0" cy="-70" rx="12" ry="55" fill="url(#gold)"/>
    <circle cx="0" cy="-128" r="20" fill="none" stroke="url(#gold)" stroke-width="12"/>
  </g>

  <!-- Scissors pivot point -->
  <circle cx="256" cy="220" r="14" fill="url(#goldLight)"/>

  <!-- Comb below scissors -->
  <rect x="170" y="265" width="172" height="18" rx="9" fill="url(#gold)" opacity="0.9"/>
  <!-- Comb teeth -->
  <rect x="182" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="202" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="222" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="242" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="262" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="282" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="302" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>
  <rect x="322" y="283" width="10" height="30" rx="4" fill="url(#gold)" opacity="0.85"/>

  <!-- Divider line -->
  <rect x="90" y="338" width="332" height="2" rx="1" fill="url(#gold)" opacity="0.4"/>

  <!-- SALON text -->
  <text x="256" y="400" font-family="Georgia, 'Times New Roman', serif" font-size="62"
        font-weight="700" fill="url(#goldLight)" text-anchor="middle" letter-spacing="8">SALON</text>

  <!-- ADMIN subtext -->
  <text x="256" y="440" font-family="Georgia, serif" font-size="24"
        fill="#d97706" text-anchor="middle" letter-spacing="12" opacity="0.8">ADMIN</text>
</svg>
